{% load static %}

<div class="flex items-center gap-3">
  {% if user.is_authenticated %}
  <!-- User Avatar Dropdown -->
  <div class="hs-dropdown relative inline-flex [--placement:bottom-right] [--strategy:absolute]">
    <button id="hs-dropdown-account" type="button"
      class="hs-dropdown-toggle inline-flex h-10 w-10 items-center justify-center overflow-hidden rounded-full border-2 border-[#1a1a1a] bg-white text-[#1a1a1a] shadow-[2px_2px_0px_#1a1a1a] transition-all duration-100 hover:shadow-none hover:translate-x-[2px] hover:translate-y-[2px] focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-[#2f9f8a]"
      aria-expanded="false">
      {% if user.userprofile.profile_picture %}
      <img class="h-full w-full rounded-full object-cover" src="{{ user.userprofile.profile_picture.url }}"
        alt="{{ user.username }}" />
      {% else %}
      <div class="flex h-full w-full items-center justify-center rounded-full bg-[#9edfc7] border-2 border-[#1a1a1a]">
        <span class="text-sm font-bold text-[#1a1a1a]">{{ user.username|first|upper }}</span>
      </div>
      {% endif %}
    </button>

    <div
      class="hs-dropdown-menu absolute left-1/2 top-full z-[9998] mt-3 hidden min-w-64 -translate-x-1/2 origin-top rounded-2xl border-2 border-[#1a1a1a] bg-white p-4 shadow-[6px_6px_0px_#1a1a1a] transition-[opacity,margin] duration-150 hs-dropdown-open:opacity-100"
      aria-labelledby="hs-dropdown-account">
      <div class="pointer-events-none absolute -right-6 top-10 h-16 w-16 rounded-full bg-[#ffd166]/30"></div>
      <div class="pointer-events-none absolute -left-6 -bottom-6 h-16 w-16 rounded-full bg-[#b8ccf8]/30"></div>
      <!-- User Info -->
      <div class="relative rounded-xl border-2 border-[#1a1a1a] bg-[#fdf8ee] p-4 text-[#1a1a1a] shadow-[3px_3px_0px_#1a1a1a]">
        <div class="flex items-center gap-4">
          <div>
            {% if user.userprofile.profile_picture %}
            <img class="h-10 w-10 rounded-full border-2 border-[#1a1a1a] object-cover"
              src="{{ user.userprofile.profile_picture.url }}" alt="{{ user.username }}" />
            {% else %}
            <div class="flex h-10 w-10 items-center justify-center rounded-full border-2 border-[#1a1a1a] bg-[#9edfc7]">
              <span class="text-sm font-bold text-[#1a1a1a]">{{ user.username|first|upper }}</span>
            </div>
            {% endif %}
          </div>

          <div>
            <span class="block text-sm font-bold text-[#1a1a1a]">{{ user.username }}</span>
            <span class="block truncate text-xs text-[#5c5650]">{{ user.email }}</span>
            <span class="mt-2 inline-flex items-center gap-2 rounded-full border-2 border-[#1a1a1a] bg-[#ffd166] px-2.5 py-0.5 text-[0.7rem] font-bold uppercase tracking-[0.16em] text-[#1a1a1a] shadow-[2px_2px_0px_#1a1a1a]">
              <span aria-hidden="true">✅</span>
              Signed in
            </span>
          </div>
        </div>
      </div>

      <!-- Menu Items -->
      <div class="mt-4 space-y-3">
        <a class="group flex items-center gap-3 rounded-xl border-2 border-[#1a1a1a] bg-[#b8ccf8] px-4 py-2 text-sm font-bold text-[#1a1a1a] shadow-[3px_3px_0px_#1a1a1a] transition-all duration-100 hover:shadow-none hover:translate-x-[3px] hover:translate-y-[3px] focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-[#2f9f8a]"
          href="{% url 'users:profile' %}">
          <span class="inline-flex h-7 w-7 items-center justify-center rounded-full border-2 border-[#1a1a1a] bg-[#b8ccf8] text-[#1a1a1a] group-hover:scale-110 transition-transform">
            <svg class="h-4 w-4" fill="currentColor" viewBox="0 0 24 24">
              <path fill-rule="evenodd"
                d="M12 4a4 4 0 1 0 0 8 4 4 0 0 0 0-8Zm-2 9a4 4 0 0 0-4 4v1a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2v-1a4 4 0 0 0-4-4h-4Z"
                clip-rule="evenodd" />
            </svg>
          </span>
          <span>Profil Saya</span>
        </a>
        <a class="group flex items-center gap-3 rounded-xl border-2 border-[#1a1a1a] bg-[#f4a89a] px-4 py-2 text-sm font-bold text-[#1a1a1a] shadow-[3px_3px_0px_#1a1a1a] transition-all duration-100 hover:shadow-none hover:translate-x-[3px] hover:translate-y-[3px] focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-[#f4a89a]"
          href="/accounts/logout">
          <span class="inline-flex h-7 w-7 items-center justify-center rounded-full border-2 border-[#1a1a1a] bg-[#f4a89a] text-[#1a1a1a] group-hover:scale-110 transition-transform">
            <svg class="h-4 w-4" fill="currentColor" viewBox="0 0 24 24">
              <path fill-rule="evenodd"
                d="M2 6a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1a1 1 0 1 1-2 0V6H4v12h9v-1a1 1 0 1 1 2 0v1a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6Z"
                clip-rule="evenodd" />
              <path fill-rule="evenodd"
                d="M13.293 10.293a1 1 0 0 1 1.414 0L17 12.586l2.293-2.293a1 1 0 1 1 1.414 1.414L18.414 14l2.293 2.293a1 1 0 1 1-1.414 1.414L17 15.414l-2.293 2.293a1 1 0 1 1-1.414-1.414L15.586 14l-2.293-2.293a1 1 0 1 1 0-1.414Z"
                clip-rule="evenodd" />
            </svg>
          </span>
          <span>Keluar</span>
        </a>
      </div>
    </div>
  </div>
  {% else %}
  <a class="inline-flex items-center gap-2 rounded-full border-2 border-[#1a1a1a] bg-[#ffd166] px-4 py-2 text-sm font-bold text-[#1a1a1a] shadow-[3px_3px_0px_#1a1a1a] transition-all duration-100 hover:shadow-none hover:translate-x-[3px] hover:translate-y-[3px] focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-[#ffd166]"
    href="/accounts/login/">
    <span aria-hidden="true">🔑</span>
    <span class="tracking-wide">Masuk</span>
  </a>
  {% endif %}
</div>
