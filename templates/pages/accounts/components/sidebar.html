{% load static wagtailcore_tags wagtailsettings_tags %}

<!-- Sidebar -->
<div id="hs-application-sidebar" class="hs-overlay [--auto-close:lg] hs-overlay-open:translate-x-0 -translate-x-full transition-all duration-300 transform fixed inset-y-4 start-4 z-[60] w-[260px] lg:w-16 lg:hover:w-[260px] h-[calc(100%-2rem)] lg:block lg:translate-x-0 lg:end-auto lg:bottom-0 before:absolute before:inset-0 before:rounded-[26px] bg-baseLight-100 dark:bg-baseDark-100 rounded-2xl shadow-[5px_5px_10px_rgba(0,0,0,0.1),_-5px_-5px_10px_rgba(255,255,255,0.8)] dark:shadow-[5px_5px_10px_rgba(0,0,0,0.3),_-5px_-5px_10px_rgba(255,255,255,0.05)] border-l-2 border-t-2 border-primary-100/30 dark:border-primary-200/20 group" role="dialog" tabindex="-1" aria-label="Sidebar">

    <div class="relative flex flex-col h-full overflow-hidden">
        <!-- Logo Section -->
        <div class="px-6 lg:px-3 lg:group-hover:px-6 pt-4">
            <!-- Logo -->
            <a class="flex-none rounded-xl inline-block font-semibold focus:outline-none focus:opacity-80" href="/" aria-label="Preline">
                <!-- Logo besar untuk mobile -->
                <div class="w-[116px] lg:hidden" >
                    <img class="dark:hidden" src="{% static 'images/runutin/LightRunutinLogo.svg' %}" alt="Logo">
                    <img class="hidden dark:block" src="{% static 'images/runutin/DarkRunutinLogo.svg' %}" alt="Logo">
                </div>
                <!-- Logo kecil dan besar untuk desktop -->
                <img src="{% static 'images/runutin/small-icon-color.svg' %}" alt="Logo" class="hidden lg:block w-8 h-8 lg:group-hover:hidden" />
                <div class="hidden lg:group-hover:block h-8">
                    <img class="dark:hidden h-8" src="{% static 'images/runutin/LightRunutinLogo.svg' %}" alt="Logo">
                    <img class="hidden dark:block h-8" src="{% static 'images/runutin/DarkRunutinLogo.svg' %}" alt="Logo">

                                <span class="ms-3 lg:hidden lg:group-hover:block">Password</span>

                                    <path d="M2.038 5.61A2.01 2.01 0 0 0 2 6v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6c0-.12-.01-.238-.03-.352l-.866.65-7.89 6.032a2 2 0 0 1-2.429 0L2.884 6.288l-.846-.677Z"/>

                                    <path fill-rule="evenodd" d="M7 2a2 2 0 0 0-2 2v1a1 1 0 0 0 0 2v1a1 1 0 0 0 0 2v1a1 1 0 1 0 0 2v1a1 1 0 1 0 0 2v1a1 1 0 1 0 0 2v1a2 2 0 0 0 2 2h11a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H7Zm3 8a3 3 0 1 1 6 0 3 3 0 0 1-6 0Zm-1 7a3 3 0 0 1 3-3h2a3 3 0 0 1 3 3 1 1 0 0 1-1 1h-6a1 1 0 0 1-1-1Z" clip-rule="evenodd"/>

                        <li>

</div>
